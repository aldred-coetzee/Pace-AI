<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 640" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="flaskGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1D4ED8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="claudeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D97757;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C4653F;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="directGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="mergeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5B21B6;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.10"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1100" height="640" rx="12" fill="#F9FAFB"/>

  <!-- Title -->
  <text x="550" y="36" text-anchor="middle" font-size="14" font-weight="600" fill="#6B7280" letter-spacing="2">STATUS AGENT — PARALLEL EXECUTION FLOW</text>

  <!-- ── Step 1: Data Gathering ── -->
  <rect x="410" y="56" width="280" height="52" rx="10" fill="url(#flaskGrad)" filter="url(#shadow)"/>
  <text x="550" y="80" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">1. Gather Data</text>
  <text x="550" y="96" text-anchor="middle" font-size="10" fill="#BFDBFE">Flask — _gather_status_data(db)</text>

  <!-- Arrow down, splits -->
  <line x1="550" y1="108" x2="550" y2="130" stroke="#6B7280" stroke-width="2"/>

  <!-- Fan-out lines -->
  <line x1="550" y1="130" x2="130" y2="160" stroke="#9CA3AF" stroke-width="1.5"/>
  <line x1="550" y1="130" x2="350" y2="160" stroke="#9CA3AF" stroke-width="1.5"/>
  <line x1="550" y1="130" x2="570" y2="160" stroke="#9CA3AF" stroke-width="1.5"/>
  <line x1="550" y1="130" x2="790" y2="160" stroke="#9CA3AF" stroke-width="1.5"/>
  <line x1="550" y1="130" x2="990" y2="160" stroke="#9CA3AF" stroke-width="1.5"/>

  <!-- ── Step 2: Parallel zone label ── -->
  <rect x="30" y="148" width="1040" height="230" rx="10" fill="none" stroke="#D1D5DB" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="50" y="168" font-size="10" font-weight="600" fill="#9CA3AF">PARALLEL (ThreadPoolExecutor)</text>

  <!-- ── Group A: Training ── -->
  <rect x="40" y="180" width="180" height="80" rx="8" fill="url(#claudeGrad)" filter="url(#shadow)"/>
  <text x="130" y="206" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">Training</text>
  <text x="130" y="222" text-anchor="middle" font-size="9" fill="#FDDCCD">claude -p</text>
  <text x="130" y="248" text-anchor="middle" font-size="9" fill="#FDDCCD">activities · weekly</text>

  <!-- Sections produced -->
  <rect x="46" y="268" width="76" height="20" rx="4" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1"/>
  <text x="84" y="282" text-anchor="middle" font-size="8" font-weight="600" fill="#92400E">Training Load</text>
  <rect x="130" y="268" width="76" height="20" rx="4" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1"/>
  <text x="168" y="282" text-anchor="middle" font-size="8" font-weight="600" fill="#92400E">Recent Runs</text>

  <!-- ── Group B: Recovery ── -->
  <rect x="260" y="180" width="180" height="80" rx="8" fill="url(#claudeGrad)" filter="url(#shadow)"/>
  <text x="350" y="206" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">Recovery</text>
  <text x="350" y="222" text-anchor="middle" font-size="9" fill="#FDDCCD">claude -p</text>
  <text x="350" y="248" text-anchor="middle" font-size="9" fill="#FDDCCD">wellness data</text>

  <rect x="300" y="268" width="100" height="20" rx="4" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1"/>
  <text x="350" y="282" text-anchor="middle" font-size="8" font-weight="600" fill="#92400E">Recovery</text>

  <!-- ── Group C: Injury ── -->
  <rect x="480" y="180" width="180" height="80" rx="8" fill="url(#claudeGrad)" filter="url(#shadow)"/>
  <text x="570" y="206" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">Injury</text>
  <text x="570" y="222" text-anchor="middle" font-size="9" fill="#FDDCCD">claude -p</text>
  <text x="570" y="248" text-anchor="middle" font-size="9" fill="#FDDCCD">diary · facts</text>

  <rect x="520" y="268" width="100" height="20" rx="4" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1"/>
  <text x="570" y="282" text-anchor="middle" font-size="8" font-weight="600" fill="#92400E">Injury Status</text>

  <!-- ── Direct: Body Comp ── -->
  <rect x="700" y="180" width="160" height="80" rx="8" fill="url(#directGrad)" filter="url(#shadow)"/>
  <text x="780" y="206" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">Body Comp</text>
  <text x="780" y="222" text-anchor="middle" font-size="9" fill="#A7F3D0">direct render</text>
  <text x="780" y="248" text-anchor="middle" font-size="9" fill="#A7F3D0">Withings data</text>

  <rect x="730" y="268" width="100" height="20" rx="4" fill="#D1FAE5" stroke="#10B981" stroke-width="1"/>
  <text x="780" y="282" text-anchor="middle" font-size="8" font-weight="600" fill="#065F46">Body Comp</text>

  <!-- ── Direct: Schedule ── -->
  <rect x="900" y="180" width="160" height="80" rx="8" fill="url(#directGrad)" filter="url(#shadow)"/>
  <text x="980" y="206" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">Schedule</text>
  <text x="980" y="222" text-anchor="middle" font-size="9" fill="#A7F3D0">direct render</text>
  <text x="980" y="248" text-anchor="middle" font-size="9" fill="#A7F3D0">Garmin calendar</text>

  <rect x="930" y="268" width="100" height="20" rx="4" fill="#D1FAE5" stroke="#10B981" stroke-width="1"/>
  <text x="980" y="282" text-anchor="middle" font-size="8" font-weight="600" fill="#065F46">Schedule</text>

  <!-- Legend -->
  <rect x="50" y="302" width="10" height="10" rx="2" fill="#D97757"/>
  <text x="66" y="312" font-size="9" fill="#6B7280">LLM call (claude -p)</text>
  <rect x="170" y="302" width="10" height="10" rx="2" fill="#10B981"/>
  <text x="186" y="312" font-size="9" fill="#6B7280">Direct render (no LLM)</text>

  <!-- ── Step 3: Barrier ── -->
  <line x1="50" y1="340" x2="1050" y2="340" stroke="#D1D5DB" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="550" y="356" text-anchor="middle" font-size="10" font-weight="600" fill="#9CA3AF">BARRIER — wait for all parallel calls</text>

  <!-- Fan-in lines to readiness -->
  <line x1="130" y1="340" x2="550" y2="384" stroke="#9CA3AF" stroke-width="1.5"/>
  <line x1="350" y1="340" x2="550" y2="384" stroke="#9CA3AF" stroke-width="1.5"/>
  <line x1="570" y1="340" x2="550" y2="384" stroke="#9CA3AF" stroke-width="1.5"/>

  <!-- ── Step 4: Readiness ── -->
  <rect x="420" y="384" width="260" height="68" rx="10" fill="url(#claudeGrad)" filter="url(#shadow)"/>
  <text x="550" y="412" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">4. Overall Readiness</text>
  <text x="550" y="428" text-anchor="middle" font-size="9" fill="#FDDCCD">claude -p — receives summaries from Groups A, B, C</text>
  <text x="550" y="442" text-anchor="middle" font-size="9" fill="#FDDCCD">produces verdict: Fit to train | Train with caution | Rest</text>

  <rect x="485" y="460" width="130" height="20" rx="4" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1"/>
  <text x="550" y="474" text-anchor="middle" font-size="8" font-weight="600" fill="#92400E">Overall Readiness</text>

  <!-- Arrow down -->
  <line x1="550" y1="488" x2="550" y2="510" stroke="#6B7280" stroke-width="2"/>

  <!-- ── Step 5: Merge ── -->
  <rect x="330" y="510" width="440" height="52" rx="10" fill="url(#mergeGrad)" filter="url(#shadow)"/>
  <text x="550" y="534" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">5. Merge &amp; Render</text>
  <text x="550" y="550" text-anchor="middle" font-size="10" fill="#DDD6FE">_merge_status_html — section cards with RAG indicators</text>

  <!-- Direct sections feed into merge -->
  <line x1="780" y1="296" x2="770" y2="510" stroke="#10B981" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="980" y1="296" x2="770" y2="516" stroke="#10B981" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Arrow to output -->
  <line x1="550" y1="562" x2="550" y2="586" stroke="#6B7280" stroke-width="2"/>

  <!-- ── Output ── -->
  <rect x="380" y="586" width="340" height="40" rx="8" fill="#F3F4F6" stroke="#E5E7EB" stroke-width="1"/>
  <text x="550" y="611" text-anchor="middle" font-size="12" font-weight="600" fill="#374151">Styled HTML → Chat Message (agent="status")</text>
</svg>
